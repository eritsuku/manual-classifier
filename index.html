<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ClickUp Manual Classifier</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#111a33;
      --card:#121c38;
      --text:#e8ecff;
      --muted:#a9b3d6;
      --line:rgba(255,255,255,.10);
      --glow:rgba(125,160,255,.28);
      --accent:#7da0ff;
      --good:#6ee7b7;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    html,body{height:100%;}
    body{
      margin:0;
      font-family: var(--font);
      background:
        radial-gradient(900px 600px at 20% 10%, rgba(125,160,255,.18), transparent 55%),
        radial-gradient(700px 500px at 90% 20%, rgba(110,231,183,.10), transparent 55%),
        radial-gradient(900px 700px at 40% 90%, rgba(251,191,36,.10), transparent 60%),
        var(--bg);
      color: var(--text);
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(17,26,51,.88), rgba(17,26,51,.62));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: sticky;
      top: 10px;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width: 240px;
    }
    .title h1{
      font-size: 16px;
      margin:0;
      letter-spacing:.2px;
      font-weight: 680;
    }
    .title .sub{
      font-size: 12px;
      color: var(--muted);
    }

    .pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }

    .panel{
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(18,28,56,.92), rgba(18,28,56,.72));
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .panelHead{
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
    }
    .panelHead .h{
      font-size: 13px;
      font-weight: 650;
      letter-spacing:.2px;
    }
    .panelHead .hint{
      font-size: 12px;
      color: var(--muted);
    }
    .panelBody{ padding: 16px; }

    .btns{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex-wrap: wrap;
      align-items:center;
    }
    button{
      appearance:none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight: 650;
      letter-spacing:.15px;
      transition: transform .06s ease, border-color .12s ease, background .12s ease;
      white-space: nowrap;
    }
    button:hover{ border-color: rgba(125,160,255,.55); background: rgba(125,160,255,.12); }
    button:active{ transform: translateY(1px); }
    button.primary{
      border-color: rgba(125,160,255,.65);
      background: rgba(125,160,255,.22);
    }
    button.primary:hover{ background: rgba(125,160,255,.28); }
    button.ghost{ background: transparent; }
    button.danger:hover{
      border-color: rgba(251,113,133,.55);
      background: rgba(251,113,133,.12);
    }
    button:disabled{ opacity:.45; cursor:not-allowed; }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom: 12px;
    }
    .field label{
      font-size: 12px;
      color: var(--muted);
      display:flex;
      justify-content:space-between;
      gap:10px;
    }
    .field input, .field select{
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.18);
      color: var(--text);
      outline: none;
      min-width: 0;
    }
    .field input:focus, .field select:focus{
      border-color: rgba(125,160,255,.65);
      box-shadow: 0 0 0 4px rgba(125,160,255,.12);
    }

    .small{
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .divider{
      height:1px;
      background: var(--line);
      margin: 14px 0;
    }

    .radialWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 8px 0 2px;
    }
    svg{ max-width: 520px; width:100%; height:auto; }
    .wedge{
      cursor:pointer;
      transition: filter .12s ease, opacity .12s ease;
      opacity: .90;
    }
    .wedge:hover{
      filter: drop-shadow(0 0 16px var(--glow));
      opacity: 1;
    }
    /* BIGGER, OBVIOUS selection state */
    .wedge.selected{
      opacity: 1;
      filter: drop-shadow(0 0 22px rgba(125,160,255,.45));
    }
    .wedge.selectedStroke{
      stroke: rgba(125,160,255,.95) !important;
      stroke-width: 3 !important;
    }

    .centerLabel{
      font-weight: 750;
      letter-spacing:.2px;
      fill: var(--text);
    }
    .centerSub{
      fill: var(--muted);
      font-weight: 600;
    }

    .tooltip{
      position: fixed;
      z-index: 9999;
      pointer-events:none;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(17,26,51,.95);
      box-shadow: var(--shadow);
      max-width: 280px;
      transform: translate(12px, 12px);
      opacity: 0;
      transition: opacity .08s ease;
    }
    .tooltip.show{ opacity: 1; }
    .tooltip .t{ font-size: 12px; color: var(--muted); line-height:1.4; }
    .tooltip .k{ font-size: 12px; font-weight: 750; margin-bottom: 4px; color: var(--text); }

    .twoCol{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 8px;
    }
    .choiceCard{
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.04);
      padding: 12px 12px 10px;
      cursor:pointer;
      transition: border-color .12s ease, background .12s ease, transform .06s ease;
    }
    .choiceCard:hover{
      border-color: rgba(125,160,255,.55);
      background: rgba(125,160,255,.10);
    }
    .choiceCard:active{ transform: translateY(1px); }
    .choiceCard.selected{
      border-color: rgba(110,231,183,.70);
      background: rgba(110,231,183,.12);
    }
    .choiceCard h3{
      margin:0 0 8px;
      font-size: 13px;
      letter-spacing:.2px;
    }
    .choiceCard ul{
      margin:0;
      padding-left: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .destGrid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .destCard{
      display:flex;
      gap: 12px;
      justify-content:space-between;
      align-items:center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,.04);
      padding: 12px;
      min-width: 0;
      flex-wrap: wrap; /* prevents cut-off */
    }
    .destCard .left{
      display:flex;
      flex-direction:column;
      gap: 4px;
      min-width: 240px;
      flex: 1 1 240px;
    }
    .destCard .name{
      font-weight: 750;
      font-size: 13px;
      letter-spacing:.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .destCard .desc{
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .destCard .right{
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content:flex-end;
      flex: 1 1 240px;
      min-width: 240px;
    }

    .statusLine{
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.14);
      font-size: 12px;
      color: var(--muted);
      line-height:1.45;
      word-break: break-word;
    }

    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
      .topbar{ position: relative; top:auto; }
      .twoCol{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Manual Classifier</h1>
        <div class="sub">Radial postures → Distinction Mode → Folder/List destination</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end">
        <span class="pill" id="taskPill">Task: <span id="taskIdText">—</span></span>
        <span class="pill">Mode: <span id="modeText">Postures</span></span>
      </div>
    </div>

    <div class="grid">
      <div class="panel" id="mainPanel">
        <div class="panelHead">
          <div>
            <div class="h" id="panelTitle">Select postures (multi-select)</div>
            <div class="hint" id="panelHint">Hover a wedge for a quick definition. Click wedges to select. Then Next.</div>
          </div>
          <div class="btns">
            <button class="ghost danger" id="resetBtn">Reset</button>
            <button class="primary" id="nextBtn" disabled>Next</button>
          </div>
        </div>
        <div class="panelBody" id="panelBody"></div>
      </div>

      <div class="panel">
        <div class="panelHead">
          <div class="h">ClickUp Connection</div>
          <div class="hint">Token is stored only in this browser.</div>
        </div>
        <div class="panelBody">
          <div class="field">
            <label>
              <span>ClickUp Personal API Token</span>
              <span class="small" id="tokenSavedHint"></span>
            </label>
            <input id="tokenInput" type="password" placeholder="Paste token (saved locally in this browser)" />
          </div>

          <div class="field">
            <label>Workspace (choose once)</label>
            <select id="teamSelect" disabled>
              <option value="">Paste token, then Sync</option>
            </select>
          </div>

          <div class="field">
            <label>Task URL (optional fallback if task id isn’t in the link)</label>
            <input id="taskUrlInput" type="text" placeholder="Paste ClickUp task URL (app.clickup.com/...)" />
          </div>

          <div class="btns" style="justify-content:flex-start;margin-top:10px;">
            <button id="syncBtn" class="primary">Sync folders & lists</button>
          </div>
          <div class="small" id="syncMeta" style="margin-top:8px;">Not synced yet.</div>

          <div class="divider"></div>

          <div class="small" id="hostHint"></div>

          <div class="statusLine" id="statusLine">Status: idle.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip">
    <div class="k" id="ttTitle"></div>
    <div class="t" id="ttBody"></div>
  </div>

<script>
  // ====== CONFIG ======
  const CONFIG = {
    tooltips: {
      governance: "Rules/standards: institutional constraints, approvals, and policy logic.",
      oversight: "Monitoring/routing/compliance tracking without owning the deliverable.",
      execution: "You own the outcome and deliver the work product.",
      advisory: "You shape someone else’s execution; influence without ownership.",
      infrastructure: "Systems/automations/templates that enable or scale work.",
      product: "Reusable artifact meant for broad reuse (job aid, playbook, toolkit)."
    },

    // Match these folder names to your ClickUp folder names (exact text).
    recommendedFolderByPosture: {
      governance: "Data Collection Oversight & Governance",
      oversight: "Data Collection Oversight & Governance",
      execution: "Program Evaluation",
      advisory: "Consultation & Advisory",
      infrastructure: "Software & Apps",
      product: "Tools & Analytical Products"
    },

    defaultListNameHints: ["misc", "intake", "inbox", "triage"]
  };

  // ====== State ======
  const state = {
    step: "postures",
    selected: new Set(),
    resolvedDominant: null,
    taskId: null,
    teams: [],
    teamId: null,
    structure: null,
    lastSynced: null,
    showAllFolders: false
  };

  const POSTURES = [
    { key:"governance", label:"Governance Authority" },
    { key:"oversight", label:"Oversight" },
    { key:"execution", label:"Execution" },
    { key:"advisory", label:"Advisory" },
    { key:"infrastructure", label:"Infrastructure" },
    { key:"product", label:"Reusable" }
  ];

  // Explicit distinction pairs (no more generic “feels like” unless you select an odd combo)
  const DISTINCTION = {
    infrastructure_vs_advisory: {
      leftKey: "infrastructure",
      rightKey: "advisory",
      leftTitle: "Infrastructure / Tooling",
      rightTitle: "Advisory Support",
      left: [
        "Primary output is a system/template/automation that enables work.",
        "Success = reliability, repeatability, reduced friction at scale.",
        "It remains useful even when the current project ends."
      ],
      right: [
        "Primary output is guidance, review, shaping, or alignment.",
        "Success = improved decisions/execution by the owner of the work.",
        "It’s attached to someone else’s deliverable, not a system."
      ]
    },
    governance_vs_oversight: {
      leftKey: "governance",
      rightKey: "oversight",
      leftTitle: "Governance Authority",
      rightTitle: "Oversight",
      left: [
        "Defines or changes standards, constraints, or approval conditions.",
        "Sets the rules others must follow (authority design).",
        "Without this, the ‘rules’ would be unclear or inconsistent."
      ],
      right: [
        "Tracks, routes, monitors, and ensures compliance with existing rules.",
        "Keeps the machine running (authority operation), not redesigning it.",
        "Success = visibility, timeliness, and adherence."
      ]
    },
    execution_vs_advisory: {
      leftKey: "execution",
      rightKey: "advisory",
      leftTitle: "Execution Ownership",
      rightTitle: "Advisory Support",
      left: [
        "I’m accountable for the deliverable/outcome.",
        "This ends with something I produce or deliver.",
        "My role is not optional once committed."
      ],
      right: [
        "Someone else owns the deliverable; I support their outcome.",
        "My output is guidance/review/strategy rather than delivery.",
        "My involvement can end without blocking delivery."
      ]
    },
    product_vs_infrastructure: {
      leftKey: "product",
      rightKey: "infrastructure",
      leftTitle: "Reusable Product",
      rightTitle: "Infrastructure / Tooling",
      left: [
        "Primary output is a reusable artifact (job aid, playbook, template).",
        "Success = adoption/utility of the artifact itself.",
        "It’s ‘consumed’ directly by people."
      ],
      right: [
        "Primary output is a system/automation/workflow that enables work.",
        "Success = reduced friction, fewer manual steps, higher consistency.",
        "It’s ‘used’ indirectly through the process."
      ]
    },
    governance_vs_advisory: {
      leftKey: "governance",
      rightKey: "advisory",
      leftTitle: "Governance Authority",
      rightTitle: "Advisory Support",
      left: [
        "I’m defining constraints/conditions for others’ actions.",
        "This changes or clarifies institutional standards.",
        "Compliance authority matters here."
      ],
      right: [
        "I’m shaping someone else’s execution, not setting rules.",
        "I don’t own compliance authority—only influence.",
        "The task exists even without governance roles."
      ]
    }
  };

  // ====== DOM helpers ======
  function qs(id){ return document.getElementById(id); }
  function setStatus(msg){ qs("statusLine").textContent = "Status: " + msg; }

  // ====== Local storage (token + chosen workspace) ======
  function saveToken(){
    localStorage.setItem("cu_token", qs("tokenInput").value.trim());
    updateTokenSavedHint();
  }
  function loadToken(){
    const t = localStorage.getItem("cu_token") || "";
    qs("tokenInput").value = t;
    updateTokenSavedHint();
  }
  function saveTeamId(){
    if(state.teamId) localStorage.setItem("cu_team_id", String(state.teamId));
  }
  function loadTeamId(){
    const t = localStorage.getItem("cu_team_id");
    return t ? String(t) : null;
  }
  function updateTokenSavedHint(){
    const has = !!qs("tokenInput").value.trim();
    qs("tokenSavedHint").textContent = has ? "saved locally" : "";
  }

  // ====== Task ID parsing ======
  function parseTaskIdFromUrl(url){
    if(!url) return null;
    try{
      const u = new URL(url);
      const pTask = u.searchParams.get("task") || u.searchParams.get("taskId") || u.searchParams.get("id");
      if(pTask) return pTask;

      const parts = u.pathname.split("/").filter(Boolean);
      const tIndex = parts.indexOf("t");
      if(tIndex >= 0 && parts[tIndex+1]) return parts[tIndex+1];

      const last = parts[parts.length-1];
      if(last && last.length >= 5) return last;
    }catch(e){
      if(url.trim().length >= 5) return url.trim();
    }
    return null;
  }

  function getTaskId(){
    const params = new URLSearchParams(window.location.search);
    const qTask = params.get("task") || params.get("taskId") || params.get("id");
    if(qTask) return qTask;

    const pasted = qs("taskUrlInput").value.trim();
    return parseTaskIdFromUrl(pasted);
  }

  function updateTopPills(){
    qs("taskIdText").textContent = state.taskId ? state.taskId : "—";
    qs("modeText").textContent =
      state.step === "postures" ? "Postures" :
      state.step === "distinction" ? "Distinction Mode" : "Destination";
  }

  // ====== Tooltip ======
  const tooltip = qs("tooltip");
  function showTooltip(title, body, x, y){
    qs("ttTitle").textContent = title;
    qs("ttBody").textContent = body;
    tooltip.style.left = x + "px";
    tooltip.style.top = y + "px";
    tooltip.classList.add("show");
  }
  function hideTooltip(){ tooltip.classList.remove("show"); }

  // ====== ClickUp API ======
  async function cuFetch(url, token){
    const res = await fetch(url, { headers: { "Authorization": token } });
    if(!res.ok){
      const txt = await res.text();
      throw new Error(`ClickUp API ${res.status}: ${txt.slice(0,200)}`);
    }
    return res.json();
  }

  async function loadWorkspaces(token){
    const teams = await cuFetch("https://api.clickup.com/api/v2/team", token);
    const list = (teams.teams || []).map(t => ({ id: String(t.id), name: t.name }));
    state.teams = list;

    // Restore last chosen workspace if available; else default to first
    const saved = loadTeamId();
    state.teamId = saved && list.some(x => x.id === saved) ? saved : (list[0]?.id || null);

    // Populate dropdown
    const sel = qs("teamSelect");
    sel.innerHTML = "";
    for(const t of list){
      const opt = document.createElement("option");
      opt.value = t.id;
      opt.textContent = t.name;
      if(t.id === state.teamId) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.disabled = list.length === 0;

    sel.onchange = () => {
      state.teamId = sel.value;
      saveTeamId();
      // Clear old structure since workspace changed
      state.structure = null;
      qs("syncMeta").textContent = "Workspace changed. Please Sync again.";
      setStatus("Workspace selected. Ready to sync.");
      render();
    };

    saveTeamId();
  }

  async function syncClickUpStructure(){
    const token = qs("tokenInput").value.trim();
    if(!token){ setStatus("Paste your ClickUp token first."); return; }

    setStatus("Syncing… fetching workspaces …");
    await loadWorkspaces(token);

    if(!state.teamId){
      setStatus("No workspace available.");
      return;
    }

    const teamId = state.teamId;
    const teamName = state.teams.find(t => t.id === teamId)?.name || teamId;

    setStatus(`Syncing… spaces in workspace: ${teamName} …`);
    const spaces = await cuFetch(`https://api.clickup.com/api/v2/team/${teamId}/space?archived=false`, token);
    const spaceList = (spaces.spaces || []).map(s => ({ id: String(s.id), name: s.name }));

    const folderNameToLists = new Map();

    for(const sp of spaceList){
      setStatus(`Syncing… folders in space: ${sp.name} …`);
      const folders = await cuFetch(`https://api.clickup.com/api/v2/space/${sp.id}/folder?archived=false`, token);
      const fList = (folders.folders || []).map(f => ({ id: String(f.id), name: f.name }));

      for(const f of fList){
        setStatus(`Syncing… lists: ${sp.name} > ${f.name} …`);
        const lists = await cuFetch(`https://api.clickup.com/api/v2/folder/${f.id}/list?archived=false`, token);
        const lList = (lists.lists || []).map(l => ({
          id: String(l.id), name: l.name, folderName: f.name, spaceName: sp.name
        }));
        folderNameToLists.set(f.name, lList);
      }

      // Folderless lists
      setStatus(`Syncing… folderless lists in space: ${sp.name} …`);
      const folderless = await cuFetch(`https://api.clickup.com/api/v2/space/${sp.id}/list?archived=false`, token);
      const fl = (folderless.lists || []).map(l => ({
        id: String(l.id), name: l.name, folderName: null, spaceName: sp.name
      }));
      if(fl.length){
        const pseudo = "Folderless Lists";
        const existing = folderNameToLists.get(pseudo) || [];
        folderNameToLists.set(pseudo, existing.concat(fl));
      }
    }

    state.structure = { teamId, teamName, spaces: spaceList, folderNameToLists };
    state.lastSynced = new Date();
    qs("syncMeta").textContent = `Synced: ${state.lastSynced.toLocaleString()} • Workspace: ${teamName} • Folders: ${folderNameToLists.size}`;
    setStatus("Sync complete.");
    render();
  }

  async function moveTaskToList(listId, label){
    const token = qs("tokenInput").value.trim();
    const taskId = getTaskId();

    if(!taskId){
      setStatus("Missing task ID. Fix: use a ClickUp comment link like ?task={{Task ID}}");
      return;
    }

    state.taskId = taskId;
    updateTopPills();

    if(!token){ setStatus("Missing token."); return; }
    if(!listId){ setStatus("No destination list selected."); return; }
    if(!state.structure || !state.structure.teamId){ setStatus("Sync first so we know your workspace."); return; }

    const workspaceId = state.structure.teamId;
    setStatus(`Moving task to: ${label} …`);

    const url = `https://api.clickup.com/api/v3/workspaces/${encodeURIComponent(workspaceId)}/tasks/${encodeURIComponent(taskId)}/home_list/${encodeURIComponent(listId)}`;

    try{
      const res = await fetch(url, {
        method: "PUT",
        headers: {
          "Authorization": token,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ move_custom_fields: true })
      });

      if(!res.ok){
        const txt = await res.text();
        setStatus(`Move failed (${res.status}). Details: ${txt.slice(0,180)}…`);
        return;
      }

      setStatus("Moved successfully. You can close this tab.");
    }catch(err){
      setStatus("Network/API error while moving task.");
    }
  }

  // ====== UI render ======
  function render(){
    state.taskId = getTaskId();
    updateTopPills();

    const panelBody = qs("panelBody");
    panelBody.innerHTML = "";

    if(state.step === "postures"){
      qs("panelTitle").textContent = "Select postures (multi-select)";
      qs("panelHint").textContent = "Click wedges to toggle selection. Hover for definitions. Then Next.";
      qs("nextBtn").disabled = state.selected.size === 0;
      panelBody.appendChild(renderRadial());

    } else if(state.step === "distinction"){
      qs("panelTitle").textContent = "Resolve dominant posture";
      qs("panelHint").textContent = "Pick the column that best describes this task. Then Next.";
      qs("nextBtn").disabled = !state.resolvedDominant;
      panelBody.appendChild(renderDistinction());

    } else if(state.step === "destination"){
      qs("panelTitle").textContent = "Choose destination Folder + List";
      qs("panelHint").textContent = "Shows the relevant folder by default; list is overrideable. Click OK to move.";
      qs("nextBtn").disabled = true;
      panelBody.appendChild(renderDestinationSingleFolder());
    }
  }

  function renderRadial(){
    const wrap = document.createElement("div");
    wrap.className = "radialWrap";

    const size = 520;
    const cx = size/2, cy = size/2;
    const rOuter = 240;
    const rInner = 120;

    function polarToXY(angleDeg, r){
      const a = (angleDeg - 90) * Math.PI/180;
      return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    }
    function wedgePath(a0, a1){
      const p0 = polarToXY(a0, rOuter);
      const p1 = polarToXY(a1, rOuter);
      const q0 = polarToXY(a1, rInner);
      const q1 = polarToXY(a0, rInner);
      const large = (a1 - a0) > 180 ? 1 : 0;
      return [
        `M ${p0.x} ${p0.y}`,
        `A ${rOuter} ${rOuter} 0 ${large} 1 ${p1.x} ${p1.y}`,
        `L ${q0.x} ${q0.y}`,
        `A ${rInner} ${rInner} 0 ${large} 0 ${q1.x} ${q1.y}`,
        "Z"
      ].join(" ");
    }

    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("viewBox", `0 0 ${size} ${size}`);

    const ring = document.createElementNS(svgNS, "circle");
    ring.setAttribute("cx", cx);
    ring.setAttribute("cy", cy);
    ring.setAttribute("r", rOuter+8);
    ring.setAttribute("fill", "rgba(255,255,255,0.03)");
    ring.setAttribute("stroke", "rgba(255,255,255,0.10)");
    ring.setAttribute("stroke-width", "2");
    svg.appendChild(ring);

    const n = POSTURES.length;
    const startAngle = 0;
    const slice = 360 / n;

    POSTURES.forEach((p, i) => {
      const a0 = startAngle + i*slice + 2;
      const a1 = startAngle + (i+1)*slice - 2;

      const path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", wedgePath(a0, a1));
      path.setAttribute("fill", "rgba(255,255,255,0.06)");
      path.setAttribute("stroke", "rgba(255,255,255,0.12)");
      path.setAttribute("stroke-width", "1.2");
      path.classList.add("wedge");

      if(state.selected.has(p.key)){
        path.classList.add("selected");
        path.classList.add("selectedStroke");
        path.setAttribute("fill", "rgba(125,160,255,0.18)");
      }

      const mid = (a0+a1)/2;
      const labelPos = polarToXY(mid, (rOuter+rInner)/2);
      const text = document.createElementNS(svgNS, "text");
      text.setAttribute("x", labelPos.x);
      text.setAttribute("y", labelPos.y);
      text.setAttribute("text-anchor", "middle");
      text.setAttribute("dominant-baseline", "middle");
      text.setAttribute("fill", "rgba(232,236,255,0.92)");
      text.setAttribute("font-size", "12");
      text.setAttribute("font-weight", "750");
      text.textContent = p.label;

      path.addEventListener("mouseenter", (e) => showTooltip(p.label, CONFIG.tooltips[p.key], e.clientX, e.clientY));
      path.addEventListener("mousemove", (e) => showTooltip(p.label, CONFIG.tooltips[p.key], e.clientX, e.clientY));
      path.addEventListener("mouseleave", () => hideTooltip());

      // Toggle behavior: click selects; click again deselects (your request)
      path.addEventListener("click", () => {
        if(state.selected.has(p.key)) state.selected.delete(p.key);
        else state.selected.add(p.key);
        state.resolvedDominant = null;
        qs("nextBtn").disabled = state.selected.size === 0;
        render();
      });

      svg.appendChild(path);
      svg.appendChild(text);
    });

    const center = document.createElementNS(svgNS, "circle");
    center.setAttribute("cx", cx);
    center.setAttribute("cy", cy);
    center.setAttribute("r", rInner-12);
    center.setAttribute("fill", "rgba(0,0,0,0.20)");
    center.setAttribute("stroke", "rgba(255,255,255,0.12)");
    center.setAttribute("stroke-width", "1.2");
    svg.appendChild(center);

    const cText = document.createElementNS(svgNS, "text");
    cText.setAttribute("x", cx);
    cText.setAttribute("y", cy-8);
    cText.setAttribute("text-anchor", "middle");
    cText.setAttribute("class", "centerLabel");
    cText.setAttribute("font-size", "16");
    cText.textContent = "This task…";
    svg.appendChild(cText);

    const cSub = document.createElementNS(svgNS, "text");
    cSub.setAttribute("x", cx);
    cSub.setAttribute("y", cy+14);
    cSub.setAttribute("text-anchor", "middle");
    cSub.setAttribute("class", "centerSub");
    cSub.setAttribute("font-size", "12");
    cSub.textContent = state.selected.size ? `${state.selected.size} posture(s) selected` : "select one or more postures";
    svg.appendChild(cSub);

    wrap.appendChild(svg);
    return wrap;
  }

  function chooseDistinctionPair(keys){
    const s = new Set(keys);
    // explicit mapping
    if(s.has("infrastructure") && s.has("advisory")) return DISTINCTION.infrastructure_vs_advisory;
    if(s.has("governance") && s.has("oversight")) return DISTINCTION.governance_vs_oversight;
    if(s.has("execution") && s.has("advisory")) return DISTINCTION.execution_vs_advisory;
    if(s.has("product") && s.has("infrastructure")) return DISTINCTION.product_vs_infrastructure;
    if(s.has("governance") && s.has("advisory")) return DISTINCTION.governance_vs_advisory;

    // fallback (rare)
    const arr = [...s];
    const leftKey = arr[0], rightKey = arr[1];
    return {
      leftKey, rightKey,
      leftTitle: POSTURES.find(p=>p.key===leftKey)?.label || leftKey,
      rightTitle: POSTURES.find(p=>p.key===rightKey)?.label || rightKey,
      left: ["Choose this if it best matches the task’s core intent.", "Dominates the decision.", "Feels most accurate."],
      right: ["Choose this if it best matches the task’s core intent.", "Dominates the decision.", "Feels most accurate."]
    };
  }

  function renderDistinction(){
    const wrap = document.createElement("div");
    const selectedKeys = [...state.selected];
    const pair = chooseDistinctionPair(selectedKeys);

    const info = document.createElement("div");
    info.className = "small";
    info.textContent = "Pick the column that best describes the task. This sets the dominant posture.";
    wrap.appendChild(info);

    const grid = document.createElement("div");
    grid.className = "twoCol";

    const left = document.createElement("div");
    left.className = "choiceCard" + (state.resolvedDominant === pair.leftKey ? " selected" : "");
    left.innerHTML = `<h3>${pair.leftTitle}</h3><ul>${pair.left.map(x=>`<li>${x}</li>`).join("")}</ul>`;
    left.addEventListener("click", () => { state.resolvedDominant = pair.leftKey; render(); });

    const right = document.createElement("div");
    right.className = "choiceCard" + (state.resolvedDominant === pair.rightKey ? " selected" : "");
    right.innerHTML = `<h3>${pair.rightTitle}</h3><ul>${pair.right.map(x=>`<li>${x}</li>`).join("")}</ul>`;
    right.addEventListener("click", () => { state.resolvedDominant = pair.rightKey; render(); });

    grid.appendChild(left);
    grid.appendChild(right);
    wrap.appendChild(grid);

    return wrap;
  }

  function pickDefaultList(lists){
    if(!lists || lists.length === 0) return null;
    const hints = CONFIG.defaultListNameHints;
    const lower = (s)=>String(s||"").toLowerCase();
    for(const h of hints){
      const found = lists.find(l => lower(l.name).includes(h));
      if(found) return found;
    }
    return lists[0];
  }

  // Destination shows ONLY the relevant folder (with optional “show all”)
  function renderDestinationSingleFolder(){
    const wrap = document.createElement("div");

    if(!state.structure){
      const msg = document.createElement("div");
      msg.className = "statusLine";
      msg.textContent = "Click “Sync folders & lists” on the right to load your current ClickUp structure.";
      wrap.appendChild(msg);
      return wrap;
    }

    const dominant = state.resolvedDominant || [...state.selected][0];
    const recommendedFolderName = CONFIG.recommendedFolderByPosture[dominant];

    const top = document.createElement("div");
    top.className = "small";
    top.innerHTML = `<b>Dominant posture:</b> ${POSTURES.find(p=>p.key===dominant)?.label || dominant}
                     <span style="margin-left:10px;"><b>Recommended folder:</b> ${recommendedFolderName || "(not set)"} </span>`;
    wrap.appendChild(top);

    const toggleRow = document.createElement("div");
    toggleRow.style.marginTop = "10px";
    toggleRow.style.display = "flex";
    toggleRow.style.gap = "10px";
    toggleRow.style.flexWrap = "wrap";
    toggleRow.style.alignItems = "center";

    const showAllBtn = document.createElement("button");
    showAllBtn.className = "ghost";
    showAllBtn.textContent = state.showAllFolders ? "Show only recommended folder" : "Show all folders";
    showAllBtn.onclick = () => { state.showAllFolders = !state.showAllFolders; render(); };

    toggleRow.appendChild(showAllBtn);
    wrap.appendChild(toggleRow);

    const map = state.structure.folderNameToLists;
    const folderNamesAll = [...map.keys()].sort((a,b)=>a.localeCompare(b));

    const foldersToShow = state.showAllFolders
      ? folderNamesAll
      : (recommendedFolderName && map.has(recommendedFolderName) ? [recommendedFolderName] : folderNamesAll.slice(0,1));

    const grid = document.createElement("div");
    grid.className = "destGrid";

    for(const folderName of foldersToShow){
      const lists = map.get(folderName) || [];
      const defaultList = pickDefaultList(lists);

      const card = document.createElement("div");
      card.className = "destCard";

      const left = document.createElement("div");
      left.className = "left";
      left.innerHTML = `
        <div class="name">${folderName}</div>
        <div class="desc">${lists.length} list(s) available</div>
      `;

      const right = document.createElement("div");
      right.className = "right";

      const select = document.createElement("select");
      select.style.flex = "1 1 240px";
      for(const l of lists){
        const opt = document.createElement("option");
        opt.value = l.id;
        opt.textContent = l.name;
        if(defaultList && String(l.id) === String(defaultList.id)) opt.selected = true;
        select.appendChild(opt);
      }

      const ok = document.createElement("button");
      ok.className = "primary";
      ok.textContent = "OK";
      ok.onclick = async () => {
        const listId = select.value;
        const listName = lists.find(x => String(x.id) === String(listId))?.name || "Selected List";
        await moveTaskToList(listId, `${folderName} > ${listName}`);
      };

      right.appendChild(select);
      right.appendChild(ok);

      card.appendChild(left);
      card.appendChild(right);
      grid.appendChild(card);
    }

    wrap.appendChild(grid);
    return wrap;
  }

  // ====== Navigation ======
  function goNext(){
    if(state.step === "postures"){
      if(state.selected.size === 1){
        state.resolvedDominant = [...state.selected][0];
        state.step = "destination";
      } else {
        state.step = "distinction";
        state.resolvedDominant = null;
      }
    } else if(state.step === "distinction"){
      const dom = state.resolvedDominant;
      if(!dom) return;

      const others = [...state.selected].filter(k => k !== dom);
      if(others.length >= 2){
        // tournament: reduce to dom vs one remaining
        state.selected = new Set([dom, others[0]]);
        state.resolvedDominant = null;
        state.step = "distinction";
      } else {
        state.selected = new Set([dom]);
        state.step = "destination";
      }
    }
    render();
  }

  function resetAll(){
    state.step = "postures";
    state.selected = new Set();
    state.resolvedDominant = null;
    state.showAllFolders = false;
    qs("nextBtn").disabled = true;
    render();
  }

  // ====== Init ======
  (function init(){
    // Host hint (Netlify -> GitHub)
    qs("hostHint").innerHTML =
      `<b>Security note:</b> Don’t share this link widely; it can move tasks using your token.<br>
       <span class="small">Host: ${location.hostname}</span>`;

    loadToken();

    // Keep task id live
    state.taskId = getTaskId();
    updateTopPills();

    // Save token continuously
    qs("tokenInput").addEventListener("input", () => {
      saveToken();
      // enable workspace dropdown once token exists
      qs("teamSelect").disabled = !qs("tokenInput").value.trim();
    });

    qs("taskUrlInput").addEventListener("input", () => {
      state.taskId = getTaskId();
      updateTopPills();
    });

    qs("nextBtn").addEventListener("click", goNext);
    qs("resetBtn").addEventListener("click", resetAll);

    qs("syncBtn").addEventListener("click", async () => {
      try{
        await syncClickUpStructure();
      }catch(e){
        setStatus(`Sync failed: ${e.message}`);
      }
    });

    // If token already present, enable workspace dropdown
    qs("teamSelect").disabled = !qs("tokenInput").value.trim();

    render();
  })();
</script>
</body>
